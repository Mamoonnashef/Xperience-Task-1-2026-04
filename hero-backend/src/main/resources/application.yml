spring:
  application:
    name: hero

  datasource:
    url: jdbc:postgresql://localhost:5432/hero
    username: postgres
    password: "1234"
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: hero
        format_sql: true

wasender:
  api-key: "${WASENDERAPI_KEY:c6dbb7d1b7d29da8ac7521b07cb81ad0d0d96f6bf6fede52684af00a74dd2f78}"
  api-url: "https://wasenderapi.com/api/send-message"

server:
  port: 8280
